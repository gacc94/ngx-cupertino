<button type="button" class="sidebar-toggle-fab" (click)="toggleSidebar()" [attr.aria-label]="sidebarOpen() ? 'Close sidebar' : 'Open sidebar'">
    @if (sidebarOpen()) { ✕ } @else { ☰ }
</button>
<nav class="sidebar" [class.sidebar-open]="sidebarOpen()">
    <div class="sidebar-header">
        <h2 class="logo">ngx-cupertino</h2>
        <button type="button" class="sidebar-close-btn" (click)="toggleSidebar()" aria-label="Close sidebar">
            ✕
        </button>
    </div>
    <ul>
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }" (click)="toggleSidebar()">Home</a></li>
        <li><a routerLink="/button" routerLinkActive="active" (click)="toggleSidebar()">Button</a></li>
        <li><a routerLink="/toggle" routerLinkActive="active" (click)="toggleSidebar()">Toggle</a></li>
        <li><a routerLink="/text-field" routerLinkActive="active" (click)="toggleSidebar()">Text Field</a></li>
        <li><a routerLink="/slider" routerLinkActive="active" (click)="toggleSidebar()">Slider</a></li>
        <li><a routerLink="/stepper" routerLinkActive="active" (click)="toggleSidebar()">Stepper</a></li>
        <li><a routerLink="/progress" routerLinkActive="active" (click)="toggleSidebar()">Progress</a></li>
    </ul>
    <div class="sidebar-footer">
        <button type="button" cup-button variant="plain" (click)="toggleTheme()">
            @if (isDark()) { ☀️ Light } @else { 🌙 Dark }
        </button>
    </div>
</nav>
<main class="main">
    <router-outlet />
</main>
