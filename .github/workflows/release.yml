name: Release

on:
    push:
        branches: [main]

permissions:
    contents: write
    pull-requests: write

jobs:
    release-please:
        runs-on: ubuntu-latest
        outputs:
            releases_created: ${{ steps.release.outputs.releases_created }}
            tag_name: ${{ steps.release.outputs.tag_name }}
        steps:
            - id: release
              uses: googleapis/release-please-action@v4
              with:
                  config-file: release-please-config.json
                  manifest-file: .release-please-manifest.json
                  token: ${{ secrets.RELEASE_PLEASE_PAT }}

    publish:
        runs-on: ubuntu-latest
        needs: release-please
        if: ${{ needs.release-please.outputs.releases_created == 'true' }}
        permissions:
            contents: read
            id-token: write
        env:
            NX_NO_CLOUD: "true"
        steps:
            - uses: actions/checkout@v4

            - uses: oven-sh/setup-bun@v2
              with:
                  bun-version: latest

            - run: bun install --frozen-lockfile

            - run: bun nx run-many -t build --projects=tokens,icons,core,ui

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  registry-url: https://registry.npmjs.org

            - name: Update npm for OIDC support
              run: npm install -g npm@latest

            - name: Publish packages to npm
              run: |
                  npm publish dist/libs/tokens --access public --tag latest --provenance
                  npm publish dist/libs/core   --access public --tag latest --provenance
                  npm publish dist/libs/icons  --access public --tag latest --provenance
                  npm publish dist/libs/ui     --access public --tag latest --provenance
              env:
                  NODE_AUTH_TOKEN: ""
